services:
  cvwebsite:
    image: nginx:alpine
    container_name: cvwebsite
    volumes:
      - /home/jean/docker/website/cvWebsite/html:/usr/share/nginx/html:ro
      - /home/jean/docker/website/cvWebsite/html/css:/usr/share/nginx/html/css:ro
      - /home/jean/docker/website/cvWebsite/html/js:/usr/share/nginx/html/js:ro
    networks:
      - web

  airwebsite:
    image: nginx:alpine
    container_name: airwebsite
    volumes:
      - /home/jean/docker/website/airWebsite/html:/usr/share/nginx/html:ro
      - /home/jean/docker/website/airWebsite/html/css:/usr/share/nginx/html/css:ro
      - /home/jean/docker/website/airWebsite/html/js:/usr/share/nginx/html/js:ro
    networks:
      - web

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - /home/jean/docker/website/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - cvwebsite
      - airwebsite
    networks:
      - web

networks:
  web:
    driver: bridge
